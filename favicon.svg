<svg xmlns="http://www.w3.org/2000/svg"
     width="64" height="64" viewBox="0 0 64 64">
  <!-- Background -->
  <rect x="0" y="0" width="64" height="64" fill="#0b0c10"/>

  <!-- Outer circle -->
  <circle cx="32" cy="32" r="22"
          fill="none" stroke="#ffffff" stroke-width="2"/>

  <!-- Tick marks -->
  <g stroke="#ffffff" stroke-width="2" stroke-linecap="round">
    <line x1="32" y1="12" x2="32" y2="16"/>
    <line x1="18" y1="18" x2="21" y2="21"/>
    <line x1="46" y1="18" x2="43" y2="21"/>
  </g>

  <!-- Needle -->
  <line x1="32" y1="32" x2="44" y2="26"
        stroke="#ff4b4b" stroke-width="3" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="#ff4b4b"/>
</svg>
