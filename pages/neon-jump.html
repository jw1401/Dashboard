<style class="dynamic-style">
    #game {
        display: flex;
        justify-content: center;

        /* Horizontal */
        align-items: center;

        /* Vertikal */
        height: 70vh;

        width: 100%;
        margin: 0;
        overflow: hidden;

        color: white;
    }

    #msg {

        color: white;

    }

    canvas {
        border: 2px solid #00f2ff;
        box-shadow: 0 0 20px #00f2ff55;
        background-color: #1a1c2c;
        display: block;
    }

    #ui {
        position: absolute;
        text-align: center;
        user-select: none;

    }

    #restartBtn {
        padding: 10px 20px;
        font-size: 18px;
        background: #ff007b;
        color: white;
        border: none;
        cursor: pointer;
        display: none;
        margin-top: 20px;
        border-radius: 5px;
    }

    #restartBtn:hover {
        background: #ff45a1;
    }
</style>

<h1>Neon Jump</h1>

<h2>A minimalistic, high-speed arcade reaction game</h2>

<div id="game">

    <div id="ui">
        <h1 id="msg">NEON JUMP</h1>
        <p id="scoreLabel">Score: 0</p>
        <button id="restartBtn">Nochmal spielen</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const restartBtn = document.getElementById('restartBtn');
        const scoreLabel = document.getElementById('scoreLabel');
        const msg = document.getElementById('msg');

        // Spielfeld-Größe
        canvas.width = 800;
        canvas.height = 400;

        // Spiel-Variablen
        let score = 0;
        let gameActive = false;
        let obstacles = [];
        let frameCount = 0;

        const player = {
            x: 50,
            y: 200,
            width: 30,
            height: 30,
            color: '#ff007b',
            dy: 0,
            jumpForce: -8,
            gravity: 0.4
        };

        function createObstacle() {
            const minHeight = 50;
            const maxHeight = 200;
            const height = Math.floor(Math.random() * (maxHeight - minHeight) + minHeight);
            obstacles.push({
                x: canvas.width,
                y: canvas.height - height,
                width: 40,
                height: height,
                color: '#00f2ff'
            });
        }

        function update() {
            if (!gameActive) return;

            // Gravitation anwenden
            player.dy += player.gravity;
            player.y += player.dy;

            // Boden-Kollision
            if (player.y + player.height > canvas.height) {
                player.y = canvas.height - player.height;
                gameOver();
            }
            // Decken-Kollision
            if (player.y < 0) {
                player.y = 0;
                player.dy = 0;
            }

            // Hindernisse bewegen
            if (frameCount % 90 === 0) createObstacle();

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= 5; // Geschwindigkeit

                // Kollisionsabfrage (AABB)
                if (player.x < obstacles[i].x + obstacles[i].width &&
                    player.x + player.width > obstacles[i].x &&
                    player.y < obstacles[i].y + obstacles[i].height &&
                    player.y + player.height > obstacles[i].y) {
                    gameOver();
                }

                // Löschen, wenn aus dem Bild
                if (obstacles[i].x + obstacles[i].width < 0) {
                    obstacles.splice(i, 1);
                    score++;
                    scoreLabel.innerText = `Score: ${score}`;
                }
            }

            frameCount++;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Spieler zeichnen (mit Glow)
            ctx.shadowBlur = 15;
            ctx.shadowColor = player.color;
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Hindernisse zeichnen
            ctx.shadowColor = '#00f2ff';
            ctx.fillStyle = '#00f2ff';
            for (let obs of obstacles) {
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            }
            ctx.shadowBlur = 0;
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function jump() {
            if (!gameActive) {
                resetGame();
            } else {
                player.dy = player.jumpForce;
            }
        }

        function gameOver() {
            gameActive = false;
            msg.innerText = "GAME OVER";
            restartBtn.style.display = "inline-block";
        }

        function resetGame() {
            player.y = 200;
            player.dy = 0;
            obstacles = [];
            score = 0;
            frameCount = 0;
            scoreLabel.innerText = "Score: 0";
            msg.innerText = "";
            restartBtn.style.display = "none";
            gameActive = true;
        }

        // Input Handling
        window.addEventListener('keydown', (e) => { if (e.code === 'Space' || e.code === 'ArrowUp') jump(); });
        canvas.addEventListener('mousedown', jump);
        restartBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Verhindert, dass der Klick das Canvas-Event (jump) auslöst
            resetGame();         // Ruft deine vorhandene Funktion zum Zurücksetzen auf
        });

        // Start
        gameLoop();
    </script>
</div>
